services:
  qdrant:
    image: qdrant/qdrant:v1.17
    restart: always
    container_name: qdrant
    ports:
      - 6333:6333
      - 6334:6334
      - 6335:6335
    expose:
      - 6333
      - 6334
      - 6335
    volumes:
      - ./tests/tmp/qdrant/config.yaml:/qdrant/config/production.yaml
      - ./tests/tmp/qdrant/storage:/qdrant/storage